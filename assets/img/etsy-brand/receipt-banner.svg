<svg width="760" height="100" viewBox="0 0 760 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Cream ground -->
  <rect width="760" height="100" fill="#F7F4EE"/>

  <!-- Thin terracotta accent line bottom -->
  <line x1="40" y1="92" x2="720" y2="92" stroke="#C97B5C" stroke-width="1" opacity="0.6"/>

  <!-- Small enso mark on left -->
  <g transform="translate(35, 5) scale(0.18)">
    <path d="M 320 145
  C 245 105, 145 140, 110 215
  C 75 290, 110 380, 195 410
  C 285 440, 380 410, 410 320
  C 425 270, 415 220, 385 185" fill="none" stroke="#2A2A28" stroke-width="22" stroke-linecap="round" opacity="0.92"/>
    <path d="M 360 165 L 355 170" stroke="#2A2A28" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
    <path d="M 130 240 L 135 250" stroke="#2A2A28" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Wordmark centered, slightly left of true center to allow tagline air -->
  <text x="380" y="48" font-family="Cormorant Garamond, EB Garamond, Garamond, serif"
        font-size="36" font-weight="400" fill="#2A2A28" text-anchor="middle">
    Calm <tspan fill="#C97B5C">&amp;</tspan> Oak
  </text>

  <!-- Tagline below -->
  <text x="380" y="76" font-family="Inter, Helvetica Neue, Arial, sans-serif"
        font-size="12" font-weight="300" letter-spacing="4" fill="#5C5A55" text-anchor="middle">
    QUIET ART FOR CONSIDERED HOMES
  </text>

  <!-- Right side: order signal text -->
  <text x="725" y="48" font-family="Inter, Helvetica Neue, Arial, sans-serif"
        font-size="13" font-weight="500" letter-spacing="3" fill="#5C5A55" text-anchor="end">
    THANK YOU
  </text>
  <text x="725" y="76" font-family="Inter, Helvetica Neue, Arial, sans-serif"
        font-size="11" font-weight="300" fill="#5C5A55" text-anchor="end">
    Made to order · printed in the US
  </text>
</svg>
<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Warm cream ground -->
  <rect x="0" y="0" width="500" height="500" fill="#F7F4EE"/>

  <!-- Enso brushstroke: counter-clockwise from top-right, opening at ~30° from top -->
  <!-- Built as two arc segments + a small ink "lift" gap -->
  <g>
    <path d="M 320 145
             C 245 105, 145 140, 110 215
             C 75 290, 110 380, 195 410
             C 285 440, 380 410, 410 320
             C 425 270, 415 220, 385 185"
          fill="none"
          stroke="#2A2A28"
          stroke-width="22"
          stroke-linecap="round"
          opacity="0.92"/>

    <!-- Subtle ink texture: a few short dry-brush dashes inside the stroke -->
    <path d="M 360 165 L 355 170" stroke="#2A2A28" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
    <path d="M 130 240 L 135 250" stroke="#2A2A28" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
    <path d="M 400 280 L 395 285" stroke="#2A2A28" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Tiny terracotta hanko seal in bottom-right (the Calm & Oak signature accent) -->
  <g transform="translate(420, 420)">
    <rect x="-22" y="-22" width="44" height="44" fill="#C97B5C" rx="2"/>
    <text x="0" y="6"
          font-family="Cormorant Garamond, EB Garamond, Garamond, serif"
          font-size="22"
          fill="#F7F4EE"
          text-anchor="middle"
          font-weight="500">C&amp;O</text>
  </g>
</svg>